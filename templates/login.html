{% extends "base.html" %}
{% block title %}{{ t('login_btn') }} — Dream Academy{% endblock %}
{% block content %}
<div class="login-glow flex flex-col items-center justify-center min-h-[68vh] text-center">
  <span class="brand-logo w-16 h-16 rounded-2xl grid place-items-center font-extrabold text-2xl mb-4">DA</span>
  <div class="text-ink font-bold text-lg mb-1">Dream Academy</div>
  <div class="text-dim text-xs mb-8">{{ t('console_sub') }}</div>
  <form method="post" class="bg-card rounded-2xl p-6 w-full max-w-xs border border-edge">
    <label for="pin" class="label-xs block mb-3 text-start">{{ t('enter_pin') }}</label>
    <input id="pin" name="pin" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="8" autofocus
           class="w-full text-center text-2xl tracking-[0.4em] num bg-bg border border-edge rounded-lg py-3 mb-4 focus:border-accent outline-none transition" />
    {% if error %}<div class="text-bad text-sm mb-3" role="alert">{{ error }}</div>{% endif %}
    <button class="w-full bg-accent text-bg font-bold py-3 rounded-lg transition">{{ t('login_btn') }}</button>
  </form>
</div>
{% endblock %}

{% block head %}
<style>
  .login-glow { position: relative; }
  .login-glow::before { content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background: radial-gradient(900px 500px at 80% -10%, rgba(143,205,240,.16), transparent 60%); }
</style>
{% endblock %}
